<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>MarketAtlas — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        background: linear-gradient(160deg, #1e3a8a 0%, #0f172a 60%);
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .badge {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        margin-bottom: 20px;
      }
      h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; }
      p { color: #94a3b8; font-size: 14px; max-width: 320px; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #2563eb;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
      .foot { margin-top: 28px; font-size: 11px; color: rgba(148, 163, 184, 0.6); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">📡</div>
      <h1>You're offline</h1>
      <p>
        MarketAtlas needs a connection to fetch live gold, silver, crypto and
        currency prices. Reconnect and try again — pages you've already
        visited may still be available.
      </p>
      <button onclick="location.reload()">Retry</button>
      <div class="foot">MarketAtlas · MAVIK group</div>
    </div>
  </body>
</html>
